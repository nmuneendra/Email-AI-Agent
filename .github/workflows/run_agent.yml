name: Run Email AI Agent

on:
  # This allows cron-job.org to trigger this via the API instantly
  workflow_dispatch: 

jobs:
  run-agent-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Agent Dependencies
      run: |
        pip install twilio google-generativeai

    - name: Execute AI Agent Loop
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TWILIO_SID: ${{ secrets.TWILIO_SID }}
        TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
        TO_WHATSAPP: ${{ secrets.TO_WHATSAPP }}
      run: python Gmail_Agent_Auto.py
