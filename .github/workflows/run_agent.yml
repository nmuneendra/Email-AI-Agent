name: Run Email AI Agent

on:
  schedule:
    # Triggers every 2 hours. We use 17 past the hour (e.g., 2:23, 4:23) 
    # to bypass high load delays that usually happen exactly at :00
    - cron: '23 */1 * * *'
  workflow_dispatch: # This allows you to press a button to manually run it anytime

jobs:
  run-agent-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Agent Dependencies
      run: |
        pip install twilio google-generativeai

    - name: Execute AI Agent Loop
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TWILIO_SID: ${{ secrets.TWILIO_SID }}
        TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
        TO_WHATSAPP: ${{ secrets.TO_WHATSAPP }}
      run: python Gmail_Agent_Auto.py
